server:
  port: 8082

spring:
  application:
    name: log-friends-platform

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:logfriends_platform}
    username: ${POSTGRES_USER:logfriends}
    password: ${POSTGRES_PASSWORD:logfriends}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate # Flyway가 스키마 관리 → Hibernate는 검증만
    open-in-view: false   # OSIV 비활성 → 성능 예측 가능
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100 # N+1 방지
        jdbc:
          batch_size: 50 # 배치 INSERT 최적화
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    org.jooq: DEBUG
    com.logfriends.platform: DEBUG
